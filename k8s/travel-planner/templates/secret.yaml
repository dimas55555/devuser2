apiVersion: v1
kind: Secret
metadata:
  name: travel-db-secret
  namespace: {{ .Values.namespace }}

type: Opaque

stringData:
  POSTGRES_USER: {{ .Values.secret.postgresUser }}
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword }}
  POSTGRES_DB: {{ .Values.secret.postgresDb }}
  DATABASE_URL: {{ .Values.secret.databaseUrl }}