apiVersion: apps/v1
kind: Deployment

metadata:
  name: travel-api
  namespace: travel-planner

spec:
  replicas: 1

  selector:
    matchLabels:
      app: travel-api

  template:
    metadata:
      labels:
        app: travel-api

    spec:
      containers:
        - name: travel-api

          image: sydorenkodmytro2021/travel-planner-api:latest

          ports:
            - containerPort: 8000

          env:
            - name: TEST_MODE
              valueFrom:
                configMapKeyRef:
                  name: travel-config
                  key: TEST_MODE

            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: travel-config
                  key: APP_VERSION

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: travel-db-secret
                  key: DATABASE_URL