parameters:
  vmImage: 'ubuntu-latest'
  appVersion: ''
  workingDirectory: 'devops'
  dockerfilePath: 'Dockerfile'

stages:
- stage: BuildTest
  displayName: 'Project: Build and Test'
  dependsOn: PreBuild

  variables:
    APP_VERSION: ${{ parameters.appVersion }}

  jobs:
    - job: JobID_BuildAndTest
      displayName: 'Build and Test'
      pool:
        vmImage: ${{ parameters.vmImage }}

      steps:
        - checkout: self

        # Налаштування Python
        - script: |
            echo "Building service version: $(APP_VERSION)"
            python -m venv ${{ parameters.workingDirectory }}/.venv
            source ${{ parameters.workingDirectory }}/.venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r ${{ parameters.workingDirectory }}/requirements.txt
          displayName: "Build Service"

        # Запуск тестів
        - script: |
            source ${{ parameters.workingDirectory }}/.venv/bin/activate
            export PYTHONPATH=$PYTHONPATH:$(Build.SourcesDirectory)/${{ parameters.workingDirectory }}
            pytest ${{ parameters.workingDirectory }}/tests \
              --maxfail=1 \
              --disable-warnings \
              -q
          displayName: "Run Unit Tests"
        
        # 3.Перевірка Dockerfile
        - script: |
            echo "Application version: $(APP_VERSION)"
          displayName: "Print Application Version"
        - script: |
            set -e
            echo "Building test Docker image..."
            cd $(Build.SourcesDirectory)
            docker build \
              -f ${{ parameters.dockerfilePath }} \
              --build-arg AppVersion=$(APP_VERSION) \
              -t test-image:$(APP_VERSION) \
              .
            echo "Docker build successful"
            echo "Running container..."
            docker run -d -p 8000:8000 --name test-container \
              -e APP_VERSION=$(APP_VERSION) \
              test-image:$(APP_VERSION)
            sleep 5
            echo "Checking /app/info endpoint..."
            RESPONSE=$(curl -s http://localhost:8000/app/info)
            echo "Response: $RESPONSE"
            echo "$RESPONSE" | grep "$(APP_VERSION)"
            echo "Version check passed"
            echo "Cleaning up..."
            docker stop test-container
            docker rm test-container
          displayName: "Validate Dockerfile + App Version"
          condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')

