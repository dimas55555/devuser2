        # 3. Перевірка Migration Job + ORM
        - script: |
            set -e
            echo "Starting PostgreSQL container..."
            docker run -d \
              --name test-postgres \
              -e POSTGRES_USER=postgres \
              -e POSTGRES_PASSWORD=postgres \
              -e POSTGRES_DB=travel_db \
              -p 5433:5432 \
              postgres:16
            echo "Waiting for DB..."
            sleep 5
            echo "Running migration job..."
            source ${{ parameters.workingDirectory }}/.venv/bin/activate
            export PYTHONPATH=$PYTHONPATH:$(Build.SourcesDirectory)/${{ parameters.workingDirectory }}
            export DATABASE_URL="postgresql://postgres:postgres@localhost:5433/travel_db"
            python ${{ parameters.workingDirectory }}/migration_job/main.py
            echo "Checking tables..."
            docker exec test-postgres psql -U postgres -d travel_db -c "\dt"
            echo "Testing SQL query..."
            docker exec test-postgres psql -U postgres -d travel_db -c "\d users"
            echo "Migration test passed"
            echo "Cleaning up..."
            docker stop test-postgres
            docker rm test-postgres
          displayName: "Validate ORM Migration Job"

        # 4. Mode Switch Test
        - script: |
            set -e
            echo "Install tools..."
            sudo apt-get update && sudo apt-get install -y curl jq

            echo "TEST 1: DB MODE"
            docker network create a3-network || true
            echo "Start PostgreSQL..."
            docker run -d --name a3-postgres --network a3-network \
              -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=travel_db \
              postgres:16
            sleep 10
            echo "Build API image..."
            docker build -t a3-api .
            echo "Run API (DB MODE)..."
            docker run -d --name a3-api-db --network a3-network -p 8003:8000 \
              -e TEST_MODE=db -e APP_VERSION=1.0.0 \
              -e DATABASE_URL="postgresql://postgres:postgres@a3-postgres:5432/travel_db" \
              a3-api
            echo "Wait API..."
            for i in {1..20}; do
              if curl -s http://localhost:8003/health | grep -q "ok"; then
                echo "{\"status\":\"ok\"}"
                echo "✔ API READY (DB)"
                break
              fi
              sleep 2
            done
            echo "ROOT RESPONSE (DB)"
            curl -s http://localhost:8003/ | jq
            echo "CREATE USER (DB)"
            CREATE_DB=$(curl -s -X POST http://localhost:8003/users/ \
              -H "Content-Type: application/json" \
              -d '{"name":"DB User","email":"db@test.com","password":"123"}')
            echo "$CREATE_DB" | jq
            DB_ID=$(echo "$CREATE_DB" | jq -r '.id')
            echo "GET CREATED USER (DB)"
            curl -s http://localhost:8003/users/$DB_ID | jq
            echo "DELETE USER (DB)"
            DELETE_RES=$(curl -s -X DELETE http://localhost:8003/users/$DB_ID)
            echo "Response: ${DELETE_RES:-'Empty (Success)'}"

            echo "TEST 2: CACHE MODE"
            docker stop a3-api-db a3-postgres > /dev/null
            docker rm a3-api-db a3-postgres > /dev/null
            echo "Run API (CACHE MODE)..."
            docker run -d --name a3-api-cache -p 8004:8000 -e TEST_MODE=cache -e APP_VERSION=2.0.0 a3-api
            sleep 10
            echo "ROOT RESPONSE (CACHE)"
            curl -s http://localhost:8004/ | jq
            echo "CREATE USER (CACHE)"
            CREATE_CACHE=$(curl -s -X POST http://localhost:8004/users/ \
              -H "Content-Type: application/json" \
              -d '{"name":"Cache User","email":"cache@test.com","password":"123"}')
            echo "$CREATE_CACHE" | jq
            CACHE_ID=$(echo "$CREATE_CACHE" | jq -r '.id')
            echo "GET CREATED USER (CACHE)"
            curl -s http://localhost:8004/users/$CACHE_ID | jq
            echo "RESTART CACHE API"
            docker restart a3-api-cache > /dev/null
            sleep 5
            echo "LIST USERS AFTER RESTART"
            AFTER_RESTART=$(curl -s http://localhost:8004/users/)
            echo "$AFTER_RESTART" | jq
            if echo "$AFTER_RESTART" | grep -q "Cache User"; then
              echo "CACHE SHOULD NOT PERSIST DATA"
              exit 1
            else
              echo "CACHE IS EPHEMERAL (OK)"
            fi

            echo "TEST 3: DB MODE WITHOUT DB"
            docker run -d --name a3-api-db-fail -p 8005:8000 -e TEST_MODE=db \
              -e DATABASE_URL="postgresql://wrong:wrong@nohost:5432/db" a3-api
            sleep 5
            HEALTH_FAIL=$(curl -s http://localhost:8005/health || echo "Connection failed")
            echo "Health check result: $HEALTH_FAIL"
            if echo "$HEALTH_FAIL" | grep -q "ok"; then
              echo "DB MODE SHOULD FAIL WITHOUT DB"
              exit 1
            else
              echo "DB MODE correctly depends on DB"
            fi
            echo "CLEANUP"
            docker rm -f a3-api-cache a3-api-db-fail > /dev/null
            docker network rm a3-network > /dev/null
            echo "TEST PASSED"
          displayName: "Mode Switch Test"

        # Пакування артефакту тестів 
        - script: |
            echo "Packaging application version: $(APP_VERSION)"
            mkdir -p $(Build.ArtifactStagingDirectory)/publish
            cp -r ${{ parameters.workingDirectory }}/* $(Build.ArtifactStagingDirectory)/publish/
            find $(Build.ArtifactStagingDirectory)/publish -type d -name "__pycache__" -exec rm -rf {} +
          displayName: "Prepare Artifacts"

        # Створення Zip
        - script: |
            cd $(Build.ArtifactStagingDirectory)
            zip -r app-$(APP_VERSION).zip publish
            echo "Created artifact: app-$(APP_VERSION).zip"
          displayName: "Create Zip Package"

        # Відправка Zip
        - task: PublishBuildArtifacts@1
          inputs:
            PathtoPublish: '$(Build.ArtifactStagingDirectory)/app-$(APP_VERSION).zip'
            ArtifactName: 'python-app-$(APP_VERSION)'
            publishLocation: 'Container'
          displayName: 'Upload Artifacts'

